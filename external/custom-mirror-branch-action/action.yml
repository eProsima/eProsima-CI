name: mirror-branch
description: Mirror a branch within the same repository

inputs:
  source:
    required: true
    description: Source branch
  dest:
    required: true
    description: Destination branch
  github-token:
    required: true
    description: GitHub token with push permissions
  path:
    required: false
    description: Relative path under $GITHUB_WORKSPACE to checkout the repository

runs:
  using: composite
  steps:
    - uses: eProsima/eProsima-CI/external/checkout@v0.49.0
      with:
        fetch-depth: 0
        token: ${{ inputs.github-token }}
        ref: ${{ inputs.source }}
        path: ${{ inputs.path }}

    - name: Push
      shell: bash
      working-directory: ${{ inputs.path || '.' }}
      run: git push origin HEAD:refs/heads/${{ inputs.dest }} --force-with-lease
